<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#0284c7">
  <defs>
    <linearGradient id="gradPill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#fff" />
    </linearGradient>
  </defs>
  <!-- Medical Cross -->
  <g class="float-cross" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.4">
    <line x1="30" y1="20" x2="30" y2="40" />
    <line x1="20" y1="30" x2="40" y2="30" />
  </g>
  <!-- Capsule 1 -->
  <g class="float-capsule-1">
    <rect x="50" y="20" width="16" height="40" rx="8" fill="url(#gradPill)" stroke="#3b82f6" stroke-width="2" transform="rotate(45 58 40)" />
  </g>
  <!-- Capsule 2 -->
  <g class="float-capsule-2">
    <circle cx="20" cy="70" r="8" fill="none" stroke="#f59e0b" stroke-width="3" />
    <line x1="16" y1="70" x2="24" y2="70" stroke="#f59e0b" stroke-width="2" />
  </g>
  <!-- Dots Grid -->
  <g fill="#0284c7" opacity="0.1" class="spin-slow" transform-origin="50 50" stroke="none">
    <circle cx="70" cy="70" r="2" />
    <circle cx="85" cy="70" r="2" />
    <circle cx="70" cy="85" r="2" />
    <circle cx="85" cy="85" r="2" />
  </g>
  <style>
    .float-cross { animation: fCross 6s ease-in-out infinite; transform-origin: 30px 30px; }
    .float-capsule-1 { animation: fCap1 5s ease-in-out infinite; transform-origin: 58px 40px; }
    .float-capsule-2 { animation: fCap2 4s ease-in-out infinite alternate; }
    .spin-slow { animation: spinSlow 15s linear infinite; }
    
    @keyframes fCross {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(15deg); }
    }
    @keyframes fCap1 {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(10px) rotate(-10deg); }
    }
    @keyframes fCap2 {
      0% { transform: translateX(0) scale(1); }
      100% { transform: translateX(10px) scale(1.1); }
    }
    @keyframes spinSlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</svg>
