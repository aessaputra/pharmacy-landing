<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#0284c7">
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#shieldGlow)" class="pulse-shield-bg" stroke="none" />
  <!-- Shield Outline -->
  <path class="draw-shield" d="M 50,15 L 80,25 V 50 C 80,70 60,85 50,90 C 40,85 20,70 20,50 V 25 Z" stroke="#0284c7" stroke-width="4" stroke-linejoin="round" />
  <!-- Checkmark inside Shield -->
  <path d="M 35,50 L 45,60 L 65,35" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  
  <style>
    .draw-shield { stroke-dasharray: 200; stroke-dashoffset: 0; animation: drawShield 4s ease-in-out infinite; }
    .pulse-shield-bg { animation: pulseShieldBg 3s ease-in-out infinite; transform-origin: 50px 50px; }
    @keyframes drawShield {
      0%, 10% { stroke-dashoffset: 200; }
      30%, 80% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -200; }
    }
    @keyframes pulseShieldBg {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</svg>
