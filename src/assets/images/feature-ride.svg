<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Cloud/Dust -->
  <path class="dust" d="M 10 85 Q 20 80 30 85 Q 40 90 50 85" stroke="#0284c7" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  
  <g class="scooter" transform="translate(5, 0)">
    <!-- Back Wheel -->
    <circle cx="30" cy="75" r="10" stroke="#0284c7" stroke-width="4" fill="#fff" class="wheel" />
    <circle cx="30" cy="75" r="3" fill="#0284c7" class="wheel" />
    
    <!-- Front Wheel -->
    <circle cx="75" cy="75" r="10" stroke="#0284c7" stroke-width="4" fill="#fff" class="wheel" />
    <circle cx="75" cy="75" r="3" fill="#0284c7" class="wheel" />

    <!-- Body -->
    <path d="M 30 75 L 40 50 L 65 50 L 75 75" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 35 50 L 30 40 L 25 40" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Steering -->
    <path d="M 65 50 L 70 35 L 75 35" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 70 35 L 65 35" stroke="#10b981" stroke-width="4" stroke-linecap="round" />

    <!-- Cargo Box -->
    <rect x="20" y="20" width="26" height="26" rx="4" fill="#0284c7" opacity="0.2" stroke="#0284c7" stroke-width="3" />
    <path d="M 20 33 H 46" stroke="#0284c7" stroke-width="3" />
    <path d="M 33 20 V 46" stroke="#0284c7" stroke-width="3" />
    <path d="M 28 26 L 33 33 L 42 24" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="draw-check" />
  </g>

  <!-- Speed Lines -->
  <g class="speed" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="5" y1="50" x2="20" y2="50" />
    <line x1="15" y1="35" x2="25" y2="35" />
    <line x1="10" y1="65" x2="25" y2="65" />
  </g>

  <style>
    .scooter { animation: ride 0.4s ease-in-out infinite alternate; }
    .wheel { animation: spin 0.3s linear infinite; transform-origin: center; transform-box: fill-box; }
    .speed line { stroke-dasharray: 10 20; animation: dash 0.5s linear infinite; }
    .dust { stroke-dasharray: 20 40; animation: dashDust 1s linear infinite; }
    .draw-check { stroke-dasharray: 30; stroke-dashoffset: 30; animation: check 2s ease forwards infinite; }
    
    @keyframes ride {
      0% { transform: translate(5px, 0px) rotate(-1deg); }
      100% { transform: translate(5px, -4px) rotate(1deg); }
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    @keyframes dash {
      0% { stroke-dashoffset: 30; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes dashDust {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes check {
      0%, 20% { stroke-dashoffset: 30; }
      40%, 80% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 30; }
    }
  </style>
</svg>
